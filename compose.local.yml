services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: skintrack-app
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - ./:/app
      - skintrack-node-modules:/app/node_modules
    env_file:
      - .env.local
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
      SUPABASE_SERVER_URL: http://host.docker.internal:54321
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  skintrack-node-modules:
